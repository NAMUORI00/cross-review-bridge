name: Validate

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  smoke-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required skill files
        shell: pwsh
        run: |
          $required = @(
            ".codex-plugin/plugin.json",
            ".agents/plugins/marketplace.json",
            "skills/cross-review-bridge/SKILL.md",
            "skills/cross-review-bridge/agents/openai.yaml",
            "skills/cross-review-bridge/scripts/New-CrossReviewBrief.ps1",
            "skills/cross-review-bridge/references/prompt-templates.md",
            "skills/pro-review-package-handoff/SKILL.md",
            "skills/pro-review-package-handoff/agents/openai.yaml",
            "skills/pro-review-package-handoff/scripts/New-ProReviewPackage.ps1",
            "skills/pro-review-package-handoff/references/package-policy.md",
            "skills/pro-review-package-handoff/references/prompt-templates.md",
            "skills/pro-review-package-handoff/references/manifest-schema.md",
            "skills/external-feedback-integrator/SKILL.md",
            "skills/external-feedback-integrator/agents/openai.yaml",
            "skills/external-feedback-integrator/scripts/Convert-ExternalFeedback.ps1",
            "skills/external-feedback-integrator/references/feedback-classification.md",
            "skills/external-feedback-integrator/references/application-policy.md"
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Missing required file: $path"
            }
          }

      - name: Validate plugin JSON files
        shell: pwsh
        run: |
          $plugin = Get-Content -LiteralPath ".codex-plugin/plugin.json" -Raw | ConvertFrom-Json
          if ($plugin.name -ne "cross-review-bridge") { throw "Unexpected plugin name" }
          if ($plugin.version -ne "0.2.0") { throw "Unexpected plugin version" }
          if ($plugin.skills -ne "./skills/") { throw "Unexpected skills path" }
          if (-not $plugin.interface.displayName) { throw "Missing plugin display name" }

          $marketplace = Get-Content -LiteralPath ".agents/plugins/marketplace.json" -Raw | ConvertFrom-Json
          if ($marketplace.plugins[0].name -ne "cross-review-bridge") { throw "Marketplace entry missing plugin" }
          if (-not $marketplace.plugins[0].policy.installation) { throw "Marketplace policy missing installation" }
          if (-not $marketplace.plugins[0].policy.authentication) { throw "Marketplace policy missing authentication" }

      - name: Run brief generation smoke test
        shell: pwsh
        run: |
          ./skills/cross-review-bridge/scripts/New-CrossReviewBrief.ps1 `
            -ProjectPath . `
            -Mode Review `
            -Goal "CI smoke test"

      - name: Run review package smoke test
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ci-fixtures -Force | Out-Null
          Set-Content -LiteralPath ci-fixtures/sample.py -Value "print('hello')" -Encoding UTF8
          Set-Content -LiteralPath ci-fixtures/test-results.log -Value "1 passed" -Encoding UTF8
          Set-Content -LiteralPath ci-fixtures/staged-only.txt -Value "staged change" -Encoding UTF8
          git add ci-fixtures/staged-only.txt
          ./skills/pro-review-package-handoff/scripts/New-ProReviewPackage.ps1 `
            -ProjectPath . `
            -Mode CodeReview `
            -Goal "CI package smoke test" `
            -IncludeFiles ci-fixtures/sample.py,ci-fixtures/test-results.log `
            -OutputPath .codex-pro-review-packages/ci-package.zip
          if (-not (Test-Path -LiteralPath ".codex-pro-review-packages/ci-package.zip" -PathType Leaf)) {
            throw "Package was not created"
          }
          $list = tar -tf .codex-pro-review-packages/ci-package.zip
          foreach ($entry in @("000_READ_ME_FIRST.txt", "000_REVIEW_PROMPT.md", "000_MANIFEST.md", "000_CODEX_WORK_SUMMARY.md", "context/git-staged-diff.patch", "source/ci-fixtures/sample.py", "artifacts/logs/ci-fixtures/test-results.log")) {
            if ($list -notcontains $entry) { throw "Missing ZIP entry: $entry" }
          }
          tar -xOf .codex-pro-review-packages/ci-package.zip 000_MANIFEST.md | Select-String "Category" | Out-Null
          tar -xOf .codex-pro-review-packages/ci-package.zip context/git-staged-diff.patch | Select-String "staged-only.txt" | Out-Null
          tar -xOf .codex-pro-review-packages/ci-package.zip 000_MANIFEST.md | Select-String "C:\\Users" -Quiet | ForEach-Object { if ($_){ throw "Manifest leaked absolute user path" } }

      - name: Run package safety regression tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ci-redact-fixtures -Force | Out-Null
          Set-Content -LiteralPath ci-redact-fixtures/large-safe.txt -Value ("x" * 1200000) -Encoding UTF8
          Add-Content -LiteralPath ci-redact-fixtures/large-safe.txt -Value "api_key=should_not_ship"
          Set-Content -LiteralPath ci-redact-fixtures/bearer.txt -Value "Authorization: Bearer abcdefghijklmnop123456" -Encoding UTF8
          ./skills/pro-review-package-handoff/scripts/New-ProReviewPackage.ps1 `
            -ProjectPath . `
            -Mode CodeReview `
            -Goal "CI safety test" `
            -IncludeFiles ../outside.txt,ci-redact-fixtures/large-safe.txt,ci-redact-fixtures/bearer.txt `
            -OutputPath .codex-pro-review-packages/ci-safety.zip
          $safetyList = tar -tf .codex-pro-review-packages/ci-safety.zip
          foreach ($entry in @("artifacts/logs/ci-redact-fixtures/large-safe.txt", "artifacts/logs/ci-redact-fixtures/bearer.txt")) {
            if ($safetyList -notcontains $entry) { throw "Missing redacted secret-like text file: $entry" }
          }
          $largeText = (tar -xOf .codex-pro-review-packages/ci-safety.zip artifacts/logs/ci-redact-fixtures/large-safe.txt) -join [Environment]::NewLine
          if ($largeText -match "should_not_ship") { throw "Large secret text leaked raw value" }
          if ($largeText -notmatch "api_key=\\[REDACTED\\]") { throw "Large secret text redaction marker missing" }
          $bearerText = (tar -xOf .codex-pro-review-packages/ci-safety.zip artifacts/logs/ci-redact-fixtures/bearer.txt) -join [Environment]::NewLine
          if ($bearerText -match "abcdefghijklmnop123456") { throw "Bearer text file leaked raw value" }
          if ($bearerText -notmatch "Authorization: Bearer \\[REDACTED\\]") { throw "Bearer text file redaction marker missing" }
          tar -xOf .codex-pro-review-packages/ci-safety.zip 000_MANIFEST.md | Select-String "../outside.txt" | Out-Null
          tar -xOf .codex-pro-review-packages/ci-safety.zip 000_MANIFEST.md | Select-String "content redacted" | Out-Null

          $redactionRepo = Join-Path $PWD "ci-redaction-repo"
          New-Item -ItemType Directory -Path $redactionRepo -Force | Out-Null
          git -C $redactionRepo init
          Set-Content -LiteralPath (Join-Path $redactionRepo "tracked.txt") -Value "clean" -Encoding UTF8
          git -C $redactionRepo add tracked.txt
          git -C $redactionRepo -c user.email=ci@example.com -c user.name=CI commit -m init
          Set-Content -LiteralPath (Join-Path $redactionRepo "tracked.txt") -Value "Authorization: Bearer abcdefghijklmnop123456" -Encoding UTF8
          ./skills/pro-review-package-handoff/scripts/New-ProReviewPackage.ps1 `
            -ProjectPath $redactionRepo `
            -Mode CodeReview `
            -Goal "CI redaction test" `
            -OutputPath .codex-pro-review-packages/ci-redaction.zip
          $diffText = (tar -xOf .codex-pro-review-packages/ci-redaction.zip context/git-diff.patch) -join [Environment]::NewLine
          if ($diffText -match "abcdefghijklmnop123456") { throw "Bearer token leaked in diff context" }
          if ($diffText -notmatch "Authorization: Bearer \\[REDACTED\\]") { throw "Bearer token redaction marker missing" }

      - name: Run feedback worksheet smoke test
        shell: pwsh
        run: |
          $feedback = @(
            "- CROSS_REVIEW_BRIDGE_OK",
            "- Add a regression test for the changed behavior.",
            "- Consider a broader refactor later."
          ) -join [Environment]::NewLine
          Set-Content -LiteralPath external-feedback.md -Encoding UTF8 -Value $feedback
          ./skills/external-feedback-integrator/scripts/Convert-ExternalFeedback.ps1 `
            -ProjectPath . `
            -FeedbackPath external-feedback.md `
            -OutputPath .codex-external-feedback/ci-feedback.md
          if (-not (Test-Path -LiteralPath ".codex-external-feedback/ci-feedback.md" -PathType Leaf)) {
            throw "Feedback worksheet was not created"
          }
